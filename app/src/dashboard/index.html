<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunomia</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
  <!-- Onboarding (shown on first run only) -->
  <div id="onboarding-screen" class="onboarding" style="display: none;">
    <div class="onboarding-card">
      <div style="font-size: 24px; font-weight: 600; font-family: var(--font-mono); margin-bottom: 4px;">Yunomia</div>
      <div style="color: var(--text-muted); margin-bottom: 20px;">Set up your project</div>

      <label>Project Name
        <input type="text" id="ob-name" placeholder="My Project">
      </label>

      <label>Mission
        <textarea id="ob-mission" rows="3" placeholder="What are you building and why? (1-2 sentences)"></textarea>
      </label>

      <label>Goals
        <textarea id="ob-goals" rows="3" placeholder="- Goal 1&#10;- Goal 2&#10;- Goal 3"></textarea>
      </label>

      <label>CEO Preset
        <select id="ob-preset"></select>
      </label>

      <label>CEO Model
        <select id="ob-model">
          <option value="claude-sonnet-4-6">Sonnet</option>
          <option value="claude-opus-4-6">Opus</option>
          <option value="claude-haiku-4-5-20251001">Haiku</option>
        </select>
      </label>

      <button class="btn btn-accent" onclick="submitOnboarding()" style="margin-top: 12px; padding: 10px; font-size: 14px; width: 100%;">Start</button>
    </div>
  </div>

  <!-- Banner -->
  <div id="banner" class="banner"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-title">Yunomia</span>
      <span class="header-project" id="project-name">-</span>
      <span class="header-version" id="app-version"></span>
    </div>
    <div class="header-right">
      <span class="cost-badge" id="cost-badge">$0.00</span>
      <button class="btn" id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="btn btn-danger" id="stop-btn" onclick="stopAll()">Stop</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="terminals" onclick="switchTab('terminals')">Terminals</div>
    <div class="tab" data-tab="tasks" onclick="switchTab('tasks')">Tasks</div>
    <div class="tab" data-tab="skills" onclick="switchTab('skills')">Skills</div>
    <div class="tab" data-tab="status" onclick="switchTab('status')">Status</div>
  </div>

  <!-- Tab: Terminals -->
  <div class="tab-content active" id="tab-terminals">
    <div class="terminal-container">
      <div class="terminal-main">
        <div class="terminal-wrapper" id="terminal-ceo"></div>
        <button class="btn terminal-back-btn" id="back-to-ceo" onclick="showCeoTerminal()">Back to CEO</button>
      </div>
      <div class="worker-bar" id="worker-bar">
        <span style="color: var(--text-muted); font-size: 11px;">Workers:</span>
      </div>
    </div>
  </div>

  <!-- Tab: Tasks -->
  <div class="tab-content" id="tab-tasks">
    <div class="tasks-container" id="tasks-container"></div>
    <div class="add-task-bar">
      <input type="text" id="add-task-input" placeholder="New task title..." onkeydown="if(event.key==='Enter')addTask()">
      <input type="datetime-local" id="add-task-schedule" title="Schedule for later (optional)">
      <button class="btn btn-accent" onclick="addTask()">Add Task</button>
    </div>
  </div>

  <!-- Tab: Skills -->
  <div class="tab-content" id="tab-skills">
    <div class="status-container">
      <div class="status-card">
        <div class="status-card-title">Available Skills</div>
        <div id="skills-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
          <div style="padding: 4px 0; font-size: 13px; color: var(--text-muted);">Loading...</div>
        </div>
      </div>
      <div class="status-card" id="skill-config-card" style="display: none;">
        <div class="status-card-title">Configure Skill</div>
        <div id="skill-config-form"></div>
      </div>
    </div>
  </div>

  <!-- Tab: Status -->
  <div class="tab-content" id="tab-status">
    <div class="status-container" id="status-container">
      <div class="status-card">
        <div class="status-card-title">CEO Agent</div>
        <div id="ceo-status-rows"></div>
      </div>
      <div class="status-card">
        <div class="status-card-title">Workers</div>
        <div id="worker-status-rows"></div>
      </div>
      <div class="status-card">
        <div class="status-card-title">Cost Breakdown</div>
        <div id="cost-status-rows"></div>
      </div>
      <div class="status-card">
        <div class="status-card-title">Safety</div>
        <div id="safety-status-rows"></div>
      </div>
      <div class="status-card">
        <div class="status-card-title">Today's Metrics</div>
        <div id="metrics-status-rows">
          <div style="padding: 4px 0; font-size: 13px; color: var(--text-muted);">Loading...</div>
        </div>
      </div>
      <div class="status-card">
        <div class="status-card-title">CEO Soul</div>
        <textarea id="soul-editor" rows="12" style="width:100%;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;padding:8px;resize:vertical;color-scheme:dark;"></textarea>
        <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
          <button class="btn btn-accent" onclick="saveSoul()">Save Soul</button>
          <span id="soul-save-status" style="font-size:12px;"></span>
        </div>
      </div>
      <div class="status-card">
        <div class="status-card-title">CEO Goals</div>
        <textarea id="goals-editor" rows="8" style="width:100%;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;padding:8px;resize:vertical;color-scheme:dark;"></textarea>
        <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
          <button class="btn btn-accent" onclick="saveGoals()">Save Goals</button>
          <span id="goals-save-status" style="font-size:12px;"></span>
        </div>
      </div>
      <div class="status-card">
        <div class="status-card-title">Settings</div>
        <div class="settings-grid" id="settings-grid">
          <label>CEO Model
            <select id="setting-ceo-model">
              <option value="claude-sonnet-4-6">Sonnet</option>
              <option value="claude-opus-4-6">Opus</option>
              <option value="claude-haiku-4-5-20251001">Haiku</option>
            </select>
          </label>
          <label>Max Workers
            <select id="setting-max-workers">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>
          <label>Daily Budget ($)
            <input type="number" id="setting-budget" min="1" max="500" value="50">
          </label>
          <label>Heartbeat (min)
            <input type="number" id="setting-heartbeat" min="1" max="60" value="10">
          </label>
          <label>Worker Timeout (min)
            <input type="number" id="setting-worker-timeout" min="1" max="120" value="60">
          </label>
          <label>Inactivity Pause (min)
            <input type="number" id="setting-inactivity" min="5" max="480" value="60">
          </label>
          <label>Spawn Approval
            <select id="setting-approval">
              <option value="false" selected>Off</option>
              <option value="true">On</option>
            </select>
          </label>
          <div class="settings-actions">
            <button class="btn btn-accent" onclick="saveSettings()">Save</button>
            <span id="settings-status" style="font-size: 12px; color: var(--green);"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar">
    <span><span class="dot green" id="ceo-dot"></span> CEO <span id="ceo-state">Starting</span></span>
    <span id="worker-count">0 workers</span>
    <span id="status-cost">$0.00 today</span>
    <span id="heartbeat-info"></span>
  </div>

  <!-- Prompt Input -->
  <div class="prompt-bar">
    <div class="prompt-input-wrapper" id="prompt-wrapper">
      <div id="image-previews" class="image-previews"></div>
      <textarea id="prompt-input" placeholder="Prompt CEO... (Shift+Enter for new line, drop images here)" rows="1"></textarea>
    </div>
    <div class="prompt-buttons">
      <button class="btn btn-mic" id="mic-btn" onclick="toggleVoice()" title="Voice input (V)">Mic</button>
      <button class="btn btn-accent" onclick="sendPrompt()">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
