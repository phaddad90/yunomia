<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mission Control — PrintPepper</title>
  <link rel="icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="kill-switch-banner" class="kill-switch-banner" hidden></div>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-name">Mission Control</span>
      <span class="brand-sub">PrintPepper</span>
    </div>
    <button id="inbox-pill" class="inbox-pill" type="button" hidden>
      <span class="bell">🔔</span>
      <span class="inbox-text">CEO Inbox: <b id="inbox-pill-count">0</b></span>
    </button>
    <div class="conn">
      <span id="live-dot" class="live-dot" data-state="off"></span>
      <span id="live-label" class="live-label">connecting…</span>
    </div>
    <div class="who">
      <span class="who-label">you are</span>
      <select id="who-select" class="who-select" aria-label="Identity">
        <option value="" disabled>—</option>
      </select>
    </div>
  </header>

  <main class="layout">
    <aside class="rail rail-left">
      <section class="panel">
        <h2 class="panel-title">Agents</h2>
        <ul id="agent-list" class="agent-list"></ul>
      </section>

      <section class="panel">
        <h2 class="panel-title">Today</h2>
        <ul id="stats" class="stats">
          <li><span>Open</span><b id="stat-open">—</b></li>
          <li><span>In review</span><b id="stat-review">—</b></li>
          <li><span>Done today</span><b id="stat-done">—</b></li>
          <li><span>Triage</span><b id="stat-triage">—</b></li>
        </ul>
      </section>

      <section class="panel">
        <h2 class="panel-title">Deploy bundle</h2>
        <ul id="deploy-bundle" class="bundle"></ul>
      </section>
    </aside>

    <section class="main">
      <nav class="tabs">
        <button class="tab active" data-tab="board">Board</button>
        <button class="tab" data-tab="activity">Activity</button>
        <button class="tab" data-tab="inbox">My inbox</button>
        <button class="tab" data-tab="lessons">Lessons</button>
        <button class="tab" data-tab="reports">Reports</button>
      </nav>

      <div class="tab-toolbar" id="tab-toolbar">
        <div class="filters">
          <label class="chip">
            <span>Audience</span>
            <select id="filter-audience">
              <option value="">All</option>
              <option value="app">App</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <label class="chip">
            <span>Assignee</span>
            <select id="filter-assignee">
              <option value="">All</option>
              <option>SA</option><option>AD</option><option>WA</option>
              <option>DA</option><option>QA</option><option>WD</option>
              <option>CEO</option><option>TA</option><option>PETER</option>
            </select>
          </label>
          <label class="chip">
            <span>Due</span>
            <select id="filter-due">
              <option value="">All</option>
              <option value="overdue">Overdue</option>
              <option value="today">Due today</option>
              <option value="week">Due this week</option>
              <option value="scheduled">Any scheduled</option>
            </select>
          </label>
          <input id="filter-q" class="search" placeholder="Search title/body…" />
        </div>
        <button id="refresh" class="btn-ghost">Refresh</button>
      </div>

      <div class="tab-panel" id="panel-board">
        <div id="kanban" class="kanban"></div>
      </div>
      <div class="tab-panel hidden" id="panel-activity">
        <ul id="activity-feed" class="activity"></ul>
      </div>
      <div class="tab-panel hidden" id="panel-inbox">
        <ul id="my-inbox" class="ticket-list"></ul>
      </div>
      <div class="tab-panel hidden" id="panel-lessons">
        <div class="lessons-toolbar">
          <input id="lessons-q" class="search" placeholder="Search symptom…" />
          <select id="lessons-severity" class="chip">
            <option value="">All severity</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="critical">critical</option>
          </select>
          <input id="lessons-tag" class="search" placeholder="tag…" style="max-width:140px" />
          <button id="lessons-new" class="btn-primary" type="button" style="margin-left:auto">+ New Lesson</button>
        </div>
        <ul id="lessons-list" class="lessons-list"></ul>
        <div id="lessons-empty" class="lessons-empty hidden"></div>
      </div>
      <div class="tab-panel hidden" id="panel-reports">
        <div id="reports" class="reports">
          <h3>Today</h3>
          <ul id="report-summary"></ul>
        </div>
      </div>
    </section>

    <aside class="rail rail-right">
      <section class="panel">
        <h2 class="panel-title">Drop a Note</h2>
        <form id="note-form" class="note-form">
          <input id="note-title" type="text" placeholder="Title (optional — auto from first line)" maxlength="180" />
          <textarea id="note-body" rows="6" maxlength="5000" placeholder="Idea, bug, ask, screenshot caption…"></textarea>
          <div id="note-attachments" class="attachments"></div>
          <div class="note-controls">
            <select id="note-audience" title="Audience">
              <option value="admin" selected>Admin</option>
              <option value="app">App</option>
            </select>
            <select id="note-type" title="Type">
              <option value="ops" selected>Ops</option>
              <option value="bug">Bug</option>
              <option value="feature">Feature</option>
            </select>
            <select id="note-assignee" title="Assignee">
              <option value="CEO" selected>🎯 CEO</option>
              <option value="SA">🟧 SA</option>
              <option value="AD">🟦 AD</option>
              <option value="WA">🟪 WA</option>
              <option value="DA">🟨 DA</option>
              <option value="QA">🟥 QA</option>
              <option value="WD">🌐 WD</option>
              <option value="TA">🛠 TA</option>
              <option value="PETER">🎩 PETER</option>
            </select>
            <button type="button" id="btn-voice" class="btn-ghost" title="Voice (Web Speech API)">🎙</button>
            <button type="button" id="btn-screenshot" class="btn-ghost" title="Attach image">📎</button>
            <input id="file-input" type="file" accept="image/*" hidden />
            <button type="submit" class="btn-primary">Send</button>
          </div>
          <div id="note-status" class="note-status"></div>
        </form>
      </section>

      <section class="panel">
        <h2 class="panel-title">CEO inbox <span id="inbox-count" class="pill"></span></h2>
        <ul id="inbox-quick" class="ticket-list compact"></ul>
      </section>
    </aside>
  </main>

  <div id="toasts" class="toasts"></div>

  <!-- Side panel for ticket details -->
  <aside id="side-panel" class="side-panel hidden" aria-hidden="true">
    <header>
      <button class="btn-ghost" id="side-close">✕</button>
      <span id="side-id" class="side-id"></span>
      <span id="side-status" class="status-pill"></span>
      <select id="side-status-mover" class="status-mover" aria-label="Move to status" hidden></select>
    </header>
    <div id="side-body" class="side-body"></div>
    <footer class="side-actions">
      <button id="side-copy" class="btn-secondary">Copy prompt</button>
      <button id="side-start" class="btn-secondary">Start</button>
      <button id="side-handoff" class="btn-secondary">Handoff</button>
      <button id="side-done" class="btn-secondary">Done</button>
    </footer>
  </aside>

  <!-- New Lesson modal -->
  <div id="lesson-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card lesson-modal-card">
      <header>
        <h3 id="lesson-modal-title">New Bug Lesson</h3>
        <button class="btn-ghost" data-close="1" type="button">✕</button>
      </header>
      <form id="lesson-form" class="lesson-form">
        <label>Symptom <span class="lesson-hint">one sentence</span></label>
        <input id="lesson-symptom" type="text" maxlength="280" required />
        <label>Severity</label>
        <select id="lesson-sev">
          <option value="medium" selected>medium</option>
          <option value="low">low</option>
          <option value="high">high</option>
          <option value="critical">critical</option>
        </select>
        <label>Tags <span class="lesson-hint">comma-separated</span></label>
        <input id="lesson-tags" type="text" placeholder="e.g. migration, postgres, auth" />
        <label>Linked ticket (PH-NNN, optional)</label>
        <input id="lesson-ticket" type="text" placeholder="PH-088" />
        <label>Root cause</label>
        <textarea id="lesson-root" rows="3"></textarea>
        <label>Fix</label>
        <textarea id="lesson-fix" rows="3"></textarea>
        <label>Files changed <span class="lesson-hint">comma-separated paths</span></label>
        <textarea id="lesson-files" rows="2"></textarea>
        <label>How to recognise the pattern next time</label>
        <textarea id="lesson-recognise" rows="2"></textarea>
        <label>Prevent action</label>
        <textarea id="lesson-prevent" rows="2"></textarea>
        <div class="lesson-actions">
          <span id="lesson-status" class="goals-status"></span>
          <button type="button" class="btn-ghost" data-close="1">Cancel</button>
          <button type="submit" class="btn-primary">Capture</button>
        </div>
      </form>
    </div>
  </div>

  <!-- CEO inbox modal -->
  <div id="inbox-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <header>
        <h3>CEO Inbox</h3>
        <span id="inbox-modal-count" class="pill"></span>
        <button id="inbox-mark-all" class="btn-secondary" type="button">Mark all processed</button>
        <button class="btn-ghost" data-close="1" type="button">✕</button>
      </header>
      <ul id="inbox-list" class="inbox-list"></ul>
    </div>
  </div>

  <script src="/dashboard.js" type="module"></script>
</body>
</html>
