<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yunomia</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-name">Yunomia</span>
      <span class="brand-sub">v3</span>
    </div>
    <nav class="tabs" id="pane-tabs">
      <button class="tab active" data-pane="dashboard">📊 Dashboard</button>
    </nav>
    <div class="actions">
      <button id="spawn-agent" class="btn-primary" type="button">+ Spawn agent</button>
    </div>
  </header>
  <main id="panes">
    <section class="pane active" data-pane="dashboard">
      <iframe
        id="dashboard-frame"
        src="http://localhost:4600/"
        title="Mission Control dashboard"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
      ></iframe>
    </section>
  </main>

  <!-- Spawn modal -->
  <div id="spawn-modal" class="modal hidden">
    <div class="modal-card">
      <header><h3>Spawn agent</h3></header>
      <form id="spawn-form">
        <label>Agent code</label>
        <select id="spawn-code" required>
          <option value="CEO">🎯 CEO</option>
          <option value="SA">🟧 SA</option>
          <option value="AD">🟦 AD</option>
          <option value="WA">🟪 WA</option>
          <option value="DA">🟨 DA</option>
          <option value="QA">🟥 QA</option>
          <option value="WD">🌐 WD</option>
          <option value="TA">🛠 TA</option>
        </select>
        <label>Model</label>
        <select id="spawn-model">
          <option value="claude-sonnet-4-6" selected>Sonnet 4.6 (default)</option>
          <option value="claude-opus-4-7">Opus 4.7</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
        <label>Working directory</label>
        <input id="spawn-cwd" type="text" placeholder="/Users/peter/Desktop/Project Eunomia" />
        <label class="temp-row"><input id="spawn-temp" type="checkbox" /> <span>Temp agent (auto-dispose after first task)</span></label>
        <div class="modal-actions">
          <button type="button" id="spawn-cancel" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Spawn</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
