<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="ybg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2a1810"/>
      <stop offset="40%"  stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="yglow" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#ff5722" stop-opacity="0.25"/>
      <stop offset="60%"  stop-color="#ff5722" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff5722" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ystroke" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ff7849"/>
      <stop offset="50%"  stop-color="#ff5722"/>
      <stop offset="100%" stop-color="#c2370b"/>
    </linearGradient>
  </defs>

  <!-- Layered background: dark base + warm radial glow -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#ybg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#yglow)"/>

  <!-- Y: two diagonal arms meeting at (32,28), then a long leg straight down -->
  <g stroke="url(#ystroke)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 16 14 L 32 28"/>
    <path d="M 48 14 L 32 28"/>
    <line x1="32" y1="28" x2="32" y2="52"/>
  </g>

  <!-- Pulse dot at the bend -->
  <circle cx="32" cy="28" r="2.6" fill="#ffb59a"/>
</svg>
